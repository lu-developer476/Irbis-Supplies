<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo negro -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Marco dorado -->
  <rect x="8" y="8" width="496" height="496"
        fill="none"
        stroke="#D4AF37"
        stroke-width="16"
        rx="40"/>

  <!-- ================= IZQUIERDA ================= -->

  <!-- Cuerpo -->
  <ellipse cx="150" cy="260" rx="70" ry="110"
           fill="#111111"
           stroke="#D4AF37"
           stroke-width="6"/>

  <!-- Refuerzo -->
  <ellipse cx="150" cy="260" rx="40" ry="70"
           fill="#000000"
           stroke="#D4AF37"
           stroke-width="4"/>

  <!-- Correas -->
  <rect x="80" y="215" width="140" height="16"
        fill="#D4AF37" rx="8"/>
  <rect x="80" y="290" width="140" height="16"
        fill="#D4AF37" rx="8"/>

  <!-- Tiras sueltas -->
  <rect x="220" y="212" width="40" height="6"
        fill="#D4AF37" rx="3"
        transform="rotate(20 220 212)"/>
  <rect x="220" y="300" width="45" height="6"
        fill="#D4AF37" rx="3"
        transform="rotate(-25 220 300)"/>

  <!-- ================= DERECHA ================= -->

  <!-- Cuerpo -->
  <ellipse cx="362" cy="260" rx="70" ry="110"
           fill="#111111"
           stroke="#D4AF37"
           stroke-width="6"/>

  <!-- Refuerzo -->
  <ellipse cx="362" cy="260" rx="40" ry="70"
           fill="#000000"
           stroke="#D4AF37"
           stroke-width="4"/>

  <!-- Correas -->
  <rect x="292" y="215" width="140" height="16"
        fill="#D4AF37" rx="8"/>
  <rect x="292" y="290" width="140" height="16"
        fill="#D4AF37" rx="8"/>

  <!-- Tiras sueltas -->
  <rect x="432" y="212" width="40" height="6"
        fill="#D4AF37" rx="3"
        transform="rotate(-20 432 212)"/>
  <rect x="432" y="300" width="45" height="6"
        fill="#D4AF37" rx="3"
        transform="rotate(25 432 300)"/>

</svg>
