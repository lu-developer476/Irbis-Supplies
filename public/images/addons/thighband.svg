<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo negro -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Borde dorado -->
  <rect x="8" y="8" width="496" height="496"
        fill="none"
        stroke="#D4AF37"
        stroke-width="16"
        rx="40"/>

  <!-- Muslera -->
  <g transform="translate(0,20)">
    
    <!-- Correa superior -->
    <rect x="176" y="120" width="200" height="40" rx="12"
          fill="#1a1a1a"
          stroke="#D4AF37"
          stroke-width="4"/>

    <!-- Cuerpo principal -->
    <rect x="196" y="170" width="160" height="200" rx="24"
          fill="#111111"
          stroke="#D4AF37"
          stroke-width="5"/>

    <!-- Bolsillo central -->
    <rect x="226" y="210" width="100" height="90" rx="12"
          fill="#1f1f1f"
          stroke="#D4AF37"
          stroke-width="3"/>

    <!-- Correa inferior -->
    <rect x="186" y="380" width="180" height="32" rx="10"
          fill="#1a1a1a"
          stroke="#D4AF37"
          stroke-width="3"/>

    <!-- Tiras laterales izquierda -->
    <rect x="120" y="200" width="80" height="18" rx="6"
          fill="#1a1a1a"
          stroke="#D4AF37"
          stroke-width="2"/>

    <rect x="120" y="240" width="80" height="18" rx="6"
          fill="#1a1a1a"
          stroke="#D4AF37"
          stroke-width="2"/>

  </g>

</svg>
