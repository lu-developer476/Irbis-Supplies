<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Borde dorado -->
  <rect 
    x="8" 
    y="8" 
    width="496" 
    height="496" 
    fill="none" 
    stroke="#D4AF37" 
    stroke-width="16"
  />

  <!-- Casco -->
  <path 
    d="M256 120
       C185 120 140 175 140 240
       L140 270
       C140 310 175 340 220 340
       L292 340
       C337 340 372 310 372 270
       L372 240
       C372 175 327 120 256 120
       Z"
    fill="#D4AF37"
  />

  <!-- Visor vidrio -->
  <rect 
    x="200" 
    y="230" 
    width="112" 
    height="50" 
    rx="10"
    fill="#1a1a1a"
    opacity="0.65"
    stroke="#ffffff"
    stroke-opacity="0.35"
    stroke-width="2"
  />

  <!-- Reflejo vidrio -->
  <path 
    d="M210 235 Q260 220 300 235"
    stroke="#ffffff"
    stroke-opacity="0.3"
    stroke-width="3"
    fill="none"
  />

  <!-- Tira izquierda (más grande y suelta) -->
  <path 
    d="M165 295
       Q140 340 150 390"
    stroke="#D4AF37"
    stroke-width="12"
    fill="none"
    stroke-linecap="round"
  />

  <!-- Punta metálica izquierda -->
  <circle 
    cx="150"
    cy="390"
    r="6"
    fill="#D4AF37"
  />

  <!-- Tira derecha (más grande y suelta) -->
  <path 
    d="M347 295
       Q372 340 362 395"
    stroke="#D4AF37"
    stroke-width="12"
    fill="none"
    stroke-linecap="round"
  />

  <!-- Punta metálica derecha -->
  <circle 
    cx="362"
    cy="395"
    r="6"
    fill="#D4AF37"
  />

</svg>
