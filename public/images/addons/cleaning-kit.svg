<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  
  <!-- Asa -->
  <path d="M44 22c0-8 8-14 20-14s20 6 20 14" 
        fill="none" 
        stroke="#c2a34a" 
        stroke-width="4" 
        stroke-linecap="round"/>

  <!-- Cuerpo del maletín -->
  <rect x="12" y="28" width="104" height="80" rx="14"
        fill="#111"
        stroke="#c2a34a"
        stroke-width="4"/>

  <!-- Línea divisoria superior -->
  <line x1="12" y1="52" x2="116" y2="52"
        stroke="#c2a34a"
        stroke-width="3"
        opacity="0.6"/>

  <!-- Compartimentos -->
  <rect x="28" y="64" width="40" height="10" rx="2"
        fill="#666"/>
  <rect x="28" y="82" width="40" height="10" rx="2"
        fill="#666"/>

  <!-- Herramientas cruzadas (varillas limpieza) -->
  <line x1="76" y1="68" x2="104" y2="96"
        stroke="#c2a34a"
        stroke-width="4"
        stroke-linecap="round"/>
  <line x1="104" y1="68" x2="76" y2="96"
        stroke="#c2a34a"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Cierre frontal -->
  <circle cx="64" cy="52" r="6"
          fill="#c2a34a"/>

</svg>
