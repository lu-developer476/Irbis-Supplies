  <!-- Lente izquierda -->
  <ellipse cx="48" cy="64" rx="14" ry="12"
           fill="#222"
           stroke="#c2a34a"
           stroke-width="3"/>

  <!-- Lente derecha -->
  <ellipse cx="80" cy="64" rx="14" ry="12"
