<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

  <!-- Fondo -->
  <rect x="8" y="8" width="112" height="112" rx="20"
        fill="#111"
        stroke="#c2a34a"
        stroke-width="4"/>

  <!-- Correa -->
  <rect x="8" y="60" width="16" height="8" rx="4" fill="#c2a34a"/>
  <rect x="104" y="60" width="16" height="8" rx="4" fill="#c2a34a"/>

  <!-- Marco principal envolvente -->
  <path d="
    M24 64
    C24 50, 40 44, 54 48
