<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <linearGradient id="bootGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6df9d"/>
      <stop offset="50%" stop-color="#caa84f"/>
      <stop offset="100%" stop-color="#7a6222"/>
    </linearGradient>

    <linearGradient id="sideShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="soleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="5"
        flood-color="#000"
        flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect x="6" y="6" width="116" height="116" rx="22"
        fill="url(#bg)"
        stroke="#caa84f"
        stroke-width="3"/>

  <g filter="url(#shadow)">

    <!-- BOTA IZQUIERDA -->
    <path d="M28 42
             v38
             c0 10 8 16 18 16
             h10
             c10 0 16 6 16 10
             v2
             H22
             v-10
             c0-14 10-20 24-20
             h4
             c4 0 6-2 6-6
             V42 Z"
          fill="url(#bootGrad)"/>

    <!-- Sombra lateral -->
    <rect x="28" y="42" width="8" height="46"
          fill="url(#sideShade)"/>

    <!-- Reflejo -->
    <path d="M32 46 v30 c0 8 6 12 12 12"
          fill="none"
          stroke="url(#highlight)"
          stroke-width="4"
          stroke-linecap="round"/>

    <!-- Costura -->
    <path d="M34 48 v28"
          stroke="#6a5320"
          stroke-width="1.5"
          stroke-dasharray="2 3"
          fill="none"/>

    <!-- SUELA IZQUIERDA (perfectamente cerrada y simétrica) -->
    <path d="M22 104
             h50
             c0 4 -4 8 -8 8
             H30
             c-4 0 -8 -4 -8 -8 Z"
          fill="url(#soleGrad)"/>

    <!-- Patrón -->
    <g stroke="#666" stroke-width="2">
      <line x1="30" y1="108" x2="38" y2="108"/>
      <line x1="44" y1="108" x2="52" y2="108"/>
      <line x1="58" y1="108" x2="64" y2="108"/>
    </g>

    <!-- BOTA DERECHA -->
    <path d="M60 42
             v38
             c0 10 8 16 18 16
             h10
             c10 0 16 6 16 10
             v2
             H54
             v-10
             c0-14 10-20 24-20
             h4
             c4 0 6-2 6-6
             V42 Z"
          fill="url(#bootGrad)"/>

    <rect x="60" y="42" width="8" height="46"
          fill="url(#sideShade)"/>

    <path d="M64 46 v30 c0 8 6 12 12 12"
          fill="none"
          stroke="url(#highlight)"
          stroke-width="4"
          stroke-linecap="round"/>

    <path d="M66 48 v28"
          stroke="#6a5320"
          stroke-width="1.5"
          stroke-dasharray="2 3"
          fill="none"/>

    <!-- SUELA DERECHA (idéntica proporción que la izquierda) -->
    <path d="M54 104
             h50
             c0 4 -4 8 -8 8
             H62
             c-4 0 -8 -4 -8 -8 Z"
          fill="url(#soleGrad)"/>

    <g stroke="#666" stroke-width="2">
      <line x1="62" y1="108" x2="70" y2="108"/>
      <line x1="76" y1="108" x2="84" y2="108"/>
      <line x1="90" y1="108" x2="96" y2="108"/>
    </g>

  </g>

  <!-- Cordones -->
  <g stroke="#3a2e10" stroke-width="2" stroke-linecap="round">
    <line x1="42" y1="50" x2="50" y2="50"/>
    <line x1="42" y1="56" x2="50" y2="56"/>
    <line x1="42" y1="62" x2="50" y2="62"/>

    <line x1="74" y1="50" x2="82" y2="50"/>
    <line x1="74" y1="56" x2="82" y2="56"/>
    <line x1="74" y1="62" x2="82" y2="62"/>
  </g>

</svg>
